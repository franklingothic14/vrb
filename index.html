<!DOCTYPE html>
<html lang="de" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Verbs Match Trainer</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link
    href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@700,800&display=swap"
    rel="stylesheet" />
  <style>
    :root,
    [data-theme="light"] {
      --bg: #EFF2F9;
      --surface: #E4EBF1;
      --dark: #6E7F8D;
      --text: #3a4a55;
      --muted: #8a9baa;
      --shadow-light: #FAFBFF;
      --shadow-dark: rgba(22, 27, 29, 0.23);
      --accent-inf: #5b8af0;
      --accent-prae: #9b6fe0;
      --green: #4db8a0;
      --red: #e07070;
    }

    [data-theme="dark"] {
      --bg: #1e2025;
      --surface: #1a1d22;
      --dark: #c8d6e5;
      --text: #b0bec8;
      --muted: #6a7f8d;
      --shadow-light: rgba(255, 255, 255, 0.04);
      --shadow-dark: rgba(0, 0, 0, 0.45);
      --accent-inf: #5b8af0;
      --accent-prae: #9b6fe0;
      --green: #4db8a0;
      --red: #e07070;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "General Sans", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .3s, color .3s;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      gap: 16px;
    }

    .header-center {
      flex: 1;
      text-align: center;
    }

    h1 {
      font-family: "Cabinet Grotesk", sans-serif;
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.1;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .header-spacer {
      width: 42px;
      flex-shrink: 0;
    }

    .theme-toggle {
      background: var(--bg);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
      transition: all .2s;
      color: var(--dark);
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    }

    .theme-toggle:active {
      box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      background: var(--bg);
      border-radius: 20px;
      padding: 18px 22px;
      margin-bottom: 24px;
      box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    }

    .controls-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls-progress {
      flex: 1;
      min-width: 140px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .progress-track {
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
      box-shadow: inset 2px 2px 4px var(--shadow-dark);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-inf), var(--accent-prae));
      border-radius: 3px;
      transition: width .4s ease;
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
      background: var(--bg);
      color: var(--muted);
      box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
      letter-spacing: .3px;
    }

    .btn:hover {
      box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    }

    .btn:active {
      box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light);
      transform: scale(.98);
    }

    .btn-primary {
      background: var(--dark);
      color: var(--bg);
    }

    .dropdown-wrap {
      position: relative;
    }

    .dropdown-trigger {
      border: none;
      border-radius: 12px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: var(--bg);
      color: var(--muted);
      box-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .dropdown-trigger:hover {
      box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    }

    .dropdown-trigger .chevron {
      font-size: 10px;
      opacity: .6;
      transition: transform .2s;
    }

    .dropdown-wrap.open .chevron {
      transform: rotate(180deg);
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      min-width: 150px;
      background: var(--bg);
      border-radius: 16px;
      box-shadow: 8px 8px 24px var(--shadow-dark), -4px -4px 14px var(--shadow-light);
      padding: 6px;
      z-index: 200;
      flex-direction: column;
      gap: 2px;
    }

    .dropdown-wrap.lang-wrap .dropdown-menu {
      left: auto;
      right: 0;
    }

    .dropdown-wrap.open .dropdown-menu {
      display: flex;
    }

    .dropdown-item {
      border: none;
      background: transparent;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      color: var(--muted);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .12s, color .12s;
      white-space: nowrap;
    }

    .dropdown-item:hover {
      background: var(--surface);
      color: var(--dark);
    }

    .dropdown-item.active {
      color: var(--dark);
      background: var(--surface);
      box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
    }

    .game-shell {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
    }

    .game-area {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      justify-items: center;
      position: relative;
      z-index: 1;
    }

    .side-counter {
      position: absolute;
      top: 0;
      width: 90px;
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }

    .side-counter.left {
      left: -110px;
    }

    .side-counter.right {
      right: -110px;
    }

    .stat {
      background: var(--bg);
      border-radius: 12px;
      padding: 8px 18px;
      text-align: center;
      width: 90px;
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light);
    }

    .stat-value {
      font-size: 26px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-family: "Cabinet Grotesk", sans-serif;
      line-height: 1;
    }

    .stat.richtig .stat-value {
      color: var(--green);
    }

    .stat.falsch .stat-value {
      color: var(--red);
    }

    .card {
      width: 100%;
      max-width: 160px;
      min-height: 82px;
      border-radius: 18px;
      border: none;
      padding: 14px 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.35;
      word-break: break-word;
      transition: all .18s cubic-bezier(.34, 1.56, .64, 1);
      background: var(--bg);
      color: var(--text);
      box-shadow: 5px 5px 12px var(--shadow-dark), -5px -5px 12px var(--shadow-light);
    }

    .card:hover:not(:disabled):not(.selected):not(.matched):not(.wrong) {
      box-shadow: 8px 8px 18px var(--shadow-dark), -8px -8px 18px var(--shadow-light);
      transform: translateY(-2px);
    }

    .card-de {
      color: var(--accent-inf);
    }

    .card-uk {
      color: var(--accent-prae);
    }

    .card.selected {
      box-shadow: inset 4px 4px 10px var(--shadow-dark), inset -4px -4px 10px var(--shadow-light);
      transform: scale(.97);
    }

    .card.matched {
      background: var(--bg) !important;
      color: var(--green) !important;
      cursor: default;
      transform: none;
      box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
    }

    .card.wrong {
      color: var(--red) !important;
      box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
    }

    .card:disabled {
      cursor: default;
    }

    .log {
      max-width: 760px;
      margin: 18px auto 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--bg);
      box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      min-height: 48px;
    }

    .log strong {
      color: var(--dark);
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 20px;
      }

      .controls {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls-right {
        margin-left: 0;
        width: 100%;
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .controls-progress {
        width: 100%;
      }

      .game-shell {
        max-width: 100%;
      }

      .side-counter {
        position: static;
        width: auto;
        height: auto;
        margin: 10px 0;
      }

      .side-counter.left,
      .side-counter.right {
        left: auto;
        right: auto;
      }

      .stat {
        width: 80px;
        height: 70px;
      }

      .card {
        max-width: 130px;
        min-height: 70px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="header-spacer"></div>
      <div class="header-center">
        <h1>German Verbs Match Trainer</h1>
        <p class="subtitle">Deutsches Verb und Übersetzung</p>
      </div>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </header>

    <div class="controls">
      <div class="controls-left">
        <button class="btn btn-primary" id="newGameBtn">Neues Spiel</button>
        <button class="btn" id="reshuffleBtn">Mischen</button>

        <div class="dropdown-wrap" id="levelDropWrap">
          <button class="dropdown-trigger" id="levelDropBtn">
            <span id="levelLabel">Alle</span>
            <span class="chevron">▾</span>
          </button>
          <div class="dropdown-menu">
            <button class="dropdown-item active" data-level="all">Alle</button>
            <button class="dropdown-item" data-level="a1">A1</button>
            <button class="dropdown-item" data-level="a2">A2</button>
            <button class="dropdown-item" data-level="b1">B1</button>
          </div>
        </div>
      </div>

      <div class="controls-progress">
        <div class="progress-meta">
          <span>Feld 4×3</span>
          <span>Paare: <span id="pairsNeeded">6</span></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <div class="controls-right">
        <div class="dropdown-wrap lang-wrap" id="langDropWrap">
          <button class="dropdown-trigger" id="langDropBtn">
            <span id="langLabel">UKR</span>
            <span class="chevron">▾</span>
          </button>
          <div class="dropdown-menu">
            <button class="dropdown-item active" data-lang="uk">🇺🇦 Українська</button>
            <button class="dropdown-item" data-lang="en">🇬🇧 English</button>
            <button class="dropdown-item" data-lang="hu">🇭🇺 Magyar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="game-shell">
      <div class="side-counter left">
        <div class="stat richtig">
          <span class="stat-value" id="statMatches">0</span>
        </div>
      </div>

      <div class="side-counter right">
        <div class="stat falsch">
          <span class="stat-value" id="statWrong">0</span>
        </div>
      </div>

      <div class="game-area" id="gameBoard"></div>
    </div>

    <div class="log" id="logBox">&nbsp;</div>
  </div>

  <script src="./words.js"></script>
  <script>
    const LEVELS = {
      all: [...window.WORDS_ALL],
      a1: [...window.WORDS_A1],
      a2: [...window.WORDS_A2],
      b1: [...window.WORDS_B1]
    };

    const LEVEL_LABELS = { all: 'Alle', a1: 'A1', a2: 'A2', b1: 'B1' };
    const LANG_LABELS = { uk: 'UKR', en: 'EN', hu: 'HU' };

    const langKey = 'german-verb-matcher-lang';
    const logKey = 'german-verb-matcher-log';
    const themeKey = 'german-verb-matcher-theme';

    let currentLang = localStorage.getItem(langKey) ||
      (navigator.language.startsWith('uk') ? 'uk' :
        navigator.language.startsWith('hu') ? 'hu' : 'uk');

    let levelKey = 'all';
    let cards = [], selected = [], lock = false;
    let correct = 0, wrong = 0;
    let currentSet = [];
    let logHistory = JSON.parse(localStorage.getItem(logKey) || '[]');

    const board = document.getElementById('gameBoard');
    const statMatches = document.getElementById('statMatches');
    const statWrong = document.getElementById('statWrong');
    const pairsNeeded = document.getElementById('pairsNeeded');
    const progressFill = document.getElementById('progressFill');
    const newGameBtn = document.getElementById('newGameBtn');
    const reshuffleBtn = document.getElementById('reshuffleBtn');
    const themeToggle = document.getElementById('themeToggle');
    const logBox = document.getElementById('logBox');
    const html = document.documentElement;

    let dark = localStorage.getItem(themeKey) === 'dark';
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    themeToggle.textContent = dark ? '☀️' : '🌙';

    themeToggle.addEventListener('click', () => {
      dark = !dark;
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      themeToggle.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem(themeKey, dark ? 'dark' : 'light');
    });

    function initDropdown(wrapId, onSelect) {
      const wrap = document.getElementById(wrapId);
      const btn = wrap.querySelector('.dropdown-trigger');
      const items = wrap.querySelectorAll('.dropdown-item');

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.dropdown-wrap.open').forEach(w => {
          if (w !== wrap) w.classList.remove('open');
        });
        wrap.classList.toggle('open');
      });

      items.forEach(item => {
        item.addEventListener('click', () => {
          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          wrap.classList.remove('open');
          onSelect(item);
        });
      });
    }

    initDropdown('levelDropWrap', (item) => {
      levelKey = item.dataset.level;
      document.getElementById('levelLabel').textContent = LEVEL_LABELS[levelKey];
      buildGame();
    });

    initDropdown('langDropWrap', (item) => {
      currentLang = item.dataset.lang;
      document.getElementById('langLabel').textContent = LANG_LABELS[currentLang];
      localStorage.setItem(langKey, currentLang);
      buildGame();
    });

    document.querySelectorAll('#langDropWrap .dropdown-item').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
    document.getElementById('langLabel').textContent = LANG_LABELS[currentLang];

    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown-wrap.open').forEach(w => w.classList.remove('open'));
    });

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function formatVerbLine(word) {
      const inf = word.infinitiv || word.de || '';
      const pres = inf.endsWith('en') ? inf.replace(/en$/, 't') : inf;
      const praet = word.praeteritum || '—';
      const part = (word.perfekt || '').replace(/^(hat|ist)\s+/, '');
      const tr = word[currentLang] || word.uk || '';
      return `<strong>${inf}</strong> | ${pres}, ${praet}, hat ${part} | ${tr}`;
    }

    function renderLog(text) {
      if (text) {
        logHistory.unshift(text);
        localStorage.setItem(logKey, JSON.stringify(logHistory));
      }
      logBox.innerHTML = logHistory.length ? logHistory.join('<br>') : '&nbsp;';
    }

    function buildGame() {
      const pool = shuffle(LEVELS[levelKey]).slice(0, 6);
      currentSet = pool;
      cards = [];
      pool.forEach((w, i) => {
        cards.push({ pair: i, text: w.infinitiv, type: 'de', matched: false });
        cards.push({ pair: i, text: w[currentLang] || w.uk || w.en || w.hu, type: 'tr', matched: false });
      });
      cards = shuffle(cards);
      selected = [];
      lock = false;
      correct = 0;
      wrong = 0;
      render();
      updateStats();
      renderLog();
    }

    function render() {
      board.innerHTML = '';
      cards.forEach((card, idx) => {
        const btn = document.createElement('button');
        btn.className = `card ${card.type === 'de' ? 'card-de' : 'card-uk'}`;
        if (card.matched) btn.classList.add('matched');
        if (selected.some(s => s.idx === idx)) btn.classList.add('selected');
        btn.innerHTML = `<span>${card.text}</span>`;
        btn.disabled = card.matched || lock;
        btn.addEventListener('click', () => onPick(idx));
        board.appendChild(btn);
      });
    }

    function updateStats() {
      statMatches.textContent = correct;
      statWrong.textContent = wrong;
      pairsNeeded.textContent = '6';
      progressFill.style.width = `${(correct / 6) * 100}%`;
    }

    function onPick(idx) {
      if (lock) return;
      const card = cards[idx];
      if (card.matched || selected.some(s => s.idx === idx)) return;

      selected.push({ idx, ...card });
      render();
      if (selected.length < 2) return;

      lock = true;
      const [a, b] = selected;

      if (a.pair === b.pair && a.type !== b.type) {
        cards[a.idx].matched = true;
        cards[b.idx].matched = true;
        correct++;
        renderLog(formatVerbLine(currentSet[a.pair]));
        updateStats();
        if (correct === 6) {
          setTimeout(() => buildGame(), 450);
        } else {
          setTimeout(() => { selected = []; lock = false; render(); }, 250);
        }
      } else {
        wrong++;
        updateStats();
        setTimeout(() => { selected = []; lock = false; render(); }, 500);
      }
    }

    newGameBtn.addEventListener('click', buildGame);
    reshuffleBtn.addEventListener('click', buildGame);
    buildGame();
  </script>
</body>

</html>
